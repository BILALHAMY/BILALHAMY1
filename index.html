<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Color Magic! 🌈</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0b0b1a;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    cursor: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Comic Sans MS', 'Trebuchet MS', Verdana, sans-serif;
    font-size: clamp(1.5rem, 6vw, 3rem);
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.8), 3px 3px 0 rgba(0,0,0,0.2);
    text-align: center;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1.5s ease;
    z-index: 10;
  }
  #hint.hidden { opacity: 0; }

  #muteBtn {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    right: max(14px, env(safe-area-inset-right));
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 20;
    backdrop-filter: blur(4px);
  }

  .emoji-pop {
    position: fixed;
    font-size: 2.5rem;
    pointer-events: none;
    z-index: 15;
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 1;
    animation: emojiFloat 1.4s ease-out forwards;
  }
  @keyframes emojiFloat {
    0% { transform: translate(-50%, -50%) scale(0.3) rotate(0deg); opacity: 1; }
    30% { transform: translate(-50%, -50%) scale(1.3) rotate(10deg); opacity: 1; }
    100% { transform: translate(-50%, -160%) scale(1) rotate(-10deg); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="hint">✨ Touch the screen! ✨</div>
<button id="muteBtn" aria-label="Toggle sound">🔊</button>

<script>
(function () {
  "use strict";

  var canvas = document.getElementById("canvas");
  var ctx = canvas.getContext("2d");
  var hint = document.getElementById("hint");
  var muteBtn = document.getElementById("muteBtn");

  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var W = 0, H = 0;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  var EMOJIS = ["🌟", "✨", "🎈", "🦄", "🌈", "💫", "🍭", "🌸", "🐬", "🍄", "🐝", "🦋"];

  /* ---------- Sound ---------- */
  var muted = false;
  var audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  }
  function playPop(y) {
    if (muted || !audioCtx) return;
    var t = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    var freq = 300 + (1 - y / H) * 500 + Math.random() * 80;
    osc.type = "sine";
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.8, t + 0.12);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.25, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.32);
  }
  muteBtn.addEventListener("click", function () {
    muted = !muted;
    muteBtn.textContent = muted ? "🔇" : "🔊";
    ensureAudio();
  });

  /* ---------- Hint ---------- */
  var hintHidden = false;
  function hideHint() {
    if (hintHidden) return;
    hintHidden = true;
    hint.classList.add("hidden");
  }

  /* ---------- Ambient blobs ---------- */
  var blobs = [];
  (function makeBlobs() {
    var count = 6;
    for (var i = 0; i < count; i++) {
      blobs.push({
        baseX: Math.random() * W,
        baseY: Math.random() * H,
        r: 140 + Math.random() * 160,
        hue: Math.random() * 360,
        speed: 0.15 + Math.random() * 0.2,
        phase: Math.random() * Math.PI * 2,
        ax: 80 + Math.random() * 120,
        ay: 60 + Math.random() * 100
      });
    }
  })();

  /* ---------- Particles ---------- */
  var particles = [];

  function spawnTrailParticle(x, y, hue) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 1.2,
      vy: (Math.random() - 0.5) * 1.2,
      r: 8 + Math.random() * 14,
      hue: hue,
      life: 1,
      decay: 0.02 + Math.random() * 0.015,
      kind: "trail"
    });
  }

  function spawnBurst(x, y) {
    var baseHue = Math.random() * 360;
    var count = 34 + Math.floor(Math.random() * 14);
    for (var i = 0; i < count; i++) {
      var angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
      var speed = 2 + Math.random() * 6;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 5 + Math.random() * 10,
        hue: (baseHue + Math.random() * 80 - 40 + 360) % 360,
        life: 1,
        decay: 0.012 + Math.random() * 0.012,
        gravity: 0.05,
        kind: "burst"
      });
    }
    playPop(y);
    spawnEmoji(x, y);
  }

  function spawnEmoji(x, y) {
    var el = document.createElement("div");
    el.className = "emoji-pop";
    el.style.left = x + "px";
    el.style.top = y + "px";
    el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    document.body.appendChild(el);
    setTimeout(function () { el.remove(); }, 1500);
  }

  function updateParticles() {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.gravity) p.vy += p.gravity;
      p.vx *= 0.98;
      p.vy *= 0.98;
      p.life -= p.decay;
      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var alpha = Math.max(p.life, 0);
      var r = p.r * (0.4 + 0.6 * p.life);
      ctx.beginPath();
      ctx.fillStyle = "hsla(" + p.hue + ", 90%, 65%, " + alpha + ")";
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /* ---------- Pointer tracking ---------- */
  var pointers = {};
  var lastActivity = performance.now();

  function handleDown(id, x, y) {
    ensureAudio();
    hideHint();
    lastActivity = performance.now();
    pointers[id] = { x: x, y: y, down: true, hue: Math.random() * 360 };
    spawnBurst(x, y);
  }

  function handleMove(id, x, y) {
    lastActivity = performance.now();
    var p = pointers[id];
    if (!p) return;
    p.hue = (p.hue + 4) % 360;
    var dx = x - p.x, dy = y - p.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var steps = Math.min(Math.max(Math.floor(dist / 8), 1), 8);
    for (var s = 0; s < steps; s++) {
      var t = s / steps;
      spawnTrailParticle(p.x + dx * t, p.y + dy * t, (p.hue + s * 10) % 360);
    }
    p.x = x;
    p.y = y;
  }

  function handleUp(id) {
    delete pointers[id];
  }

  canvas.addEventListener("pointerdown", function (e) {
    canvas.setPointerCapture(e.pointerId);
    handleDown(e.pointerId, e.clientX, e.clientY);
  });
  canvas.addEventListener("pointermove", function (e) {
    if (pointers[e.pointerId]) handleMove(e.pointerId, e.clientX, e.clientY);
  });
  canvas.addEventListener("pointerup", function (e) { handleUp(e.pointerId); });
  canvas.addEventListener("pointercancel", function (e) { handleUp(e.pointerId); });

  /* ---------- Idle auto-play (keeps toddlers fascinated even without touching) ---------- */
  var lastAutoBurst = 0;
  function maybeAutoPlay(now) {
    var idleFor = now - lastActivity;
    if (idleFor > 2200 && now - lastAutoBurst > 1400) {
      lastAutoBurst = now;
      var x = W * (0.15 + Math.random() * 0.7);
      var y = H * (0.15 + Math.random() * 0.7);
      spawnBurstSilent(x, y);
    }
  }
  function spawnBurstSilent(x, y) {
    var baseHue = Math.random() * 360;
    var count = 26 + Math.floor(Math.random() * 10);
    for (var i = 0; i < count; i++) {
      var angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
      var speed = 1.5 + Math.random() * 4.5;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 5 + Math.random() * 9,
        hue: (baseHue + Math.random() * 80 - 40 + 360) % 360,
        life: 1,
        decay: 0.012 + Math.random() * 0.01,
        gravity: 0.04,
        kind: "burst"
      });
    }
    spawnEmoji(x, y);
  }

  /* ---------- Background gradient ---------- */
  var bgHue = 220;
  function drawBackground(now) {
    bgHue = (bgHue + 0.05) % 360;
    var g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, "hsl(" + bgHue + ", 55%, 14%)");
    g.addColorStop(1, "hsl(" + ((bgHue + 60) % 360) + ", 55%, 10%)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawBlobs(now) {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (var i = 0; i < blobs.length; i++) {
      var b = blobs[i];
      b.hue = (b.hue + 0.08) % 360;
      var t = now * 0.001 * b.speed + b.phase;
      var x = b.baseX + Math.cos(t) * b.ax;
      var y = b.baseY + Math.sin(t * 0.8) * b.ay;
      var grad = ctx.createRadialGradient(x, y, 0, x, y, b.r);
      grad.addColorStop(0, "hsla(" + b.hue + ", 90%, 60%, 0.35)");
      grad.addColorStop(1, "hsla(" + b.hue + ", 90%, 60%, 0)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  /* ---------- Main loop ---------- */
  function loop(now) {
    drawBackground(now);
    drawBlobs(now);
    updateParticles();
    drawParticles();
    maybeAutoPlay(now);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  /* Kick off one gentle burst near the middle shortly after load to invite interaction */
  setTimeout(function () {
    spawnBurstSilent(W / 2, H / 2);
  }, 900);

})();
</script>
</body>
</html>
